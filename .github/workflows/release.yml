name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Fetch adb
        run: npm run setup:adb

      - name: Build exe
        run: npm run build:exe
        env:
          PKG_TARGET: node18-win-x64

      - name: Package
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path dist-exe\* -DestinationPath "ScrcpyDeck-$tag-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ScrcpyDeck-*.zip
          generate_release_notes: true
